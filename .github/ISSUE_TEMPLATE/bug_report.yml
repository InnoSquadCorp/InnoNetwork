name: Bug report
description: Report a reproducible bug in InnoNetwork
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: InnoNetwork version
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Platform, OS version, Swift version, Xcode version.
    validations:
      required: true
