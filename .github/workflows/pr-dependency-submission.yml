name: Swift PR Dependency Submission

on:
  workflow_run:
    workflows: [CI]
    # `requested` starts the first submission before runner queues drain;
    # `in_progress` also covers manual reruns, where `requested` is omitted.
    types: [requested, in_progress]

concurrency:
  group: swift-pr-dependency-submission-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  submit:
    name: Submit Swift PR Dependencies
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      PR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      PR_BASE_SHA: ${{ github.event.workflow_run.pull_requests[0].base.sha }}
      TRUSTED_WORKFLOW_SHA: ${{ github.workflow_sha }}

    steps:
      - name: Checkout trusted snapshot generator
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.workflow_sha }}
          fetch-depth: 1
          persist-credentials: false
          submodules: false
          lfs: false

      - name: Fetch Package.resolved as untrusted data
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]
          [[ "$PR_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$PR_BASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$TRUSTED_WORKFLOW_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$TRUSTED_WORKFLOW_SHA"

          pr_json="$RUNNER_TEMP/pr.json"
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" > "$pr_json"
          if ! jq -e \
              --arg sha "$PR_HEAD_SHA" \
              --arg base_sha "$PR_BASE_SHA" \
              --arg repository "$GITHUB_REPOSITORY" \
              '.state == "open"
               and .head.sha == $sha
               and .base.sha == $base_sha
               and .base.ref == "main"
               and .base.repo.full_name == $repository' \
              "$pr_json" >/dev/null; then
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Ignoring a stale PR workflow-run event."
            exit 0
          fi
          echo "current=true" >> "$GITHUB_OUTPUT"

          head_metadata="$RUNNER_TEMP/head-package-resolved.json"
          gh api \
            --method GET \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/contents/Package.resolved" \
            -f ref="$PR_HEAD_SHA" > "$head_metadata"

          base_metadata="$RUNNER_TEMP/base-package-resolved.json"
          gh api \
            --method GET \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/contents/Package.resolved" \
            -f ref="$PR_BASE_SHA" > "$base_metadata"

          python3 -I - \
            "$head_metadata" "$RUNNER_TEMP/head.Package.resolved" \
            "$base_metadata" "$RUNNER_TEMP/base.Package.resolved" <<'PY'
          import base64
          import binascii
          import json
          import sys
          from pathlib import Path

          arguments = list(map(Path, sys.argv[1:]))
          for metadata_path, destination_path in zip(arguments[::2], arguments[1::2]):
              with metadata_path.open(encoding="utf-8") as source:
                  metadata = json.load(source)

              if metadata.get("type") != "file" or metadata.get("path") != "Package.resolved":
                  raise SystemExit("Package.resolved response is not a file")
              size = metadata.get("size")
              if (
                  not isinstance(size, int)
                  or isinstance(size, bool)
                  or not 0 < size <= 1_048_576
              ):
                  raise SystemExit("Package.resolved response has an invalid size")
              content = metadata.get("content")
              if metadata.get("encoding") != "base64" or not isinstance(content, str):
                  raise SystemExit("Package.resolved response is not base64 encoded")
              try:
                  contents = base64.b64decode("".join(content.split()), validate=True)
              except (ValueError, binascii.Error) as error:
                  raise SystemExit(
                      "Package.resolved response contains invalid base64"
                  ) from error
              if len(contents) != size:
                  raise SystemExit(
                      "Package.resolved response size does not match its content"
                  )
              destination_path.write_bytes(contents)
          PY

      - name: Generate snapshot without executing PR code
        if: steps.fetch.outputs.current == 'true'
        env:
          DEPENDENCY_SNAPSHOT_SHA: ${{ github.event.workflow_run.head_sha }}
          DEPENDENCY_SNAPSHOT_REF: refs/pull/${{ github.event.workflow_run.pull_requests[0].number }}/head
          DEPENDENCY_SNAPSHOT_DETECTOR_SHA: ${{ github.workflow_sha }}
        run: |
          python3 -I Scripts/generate_dependency_snapshot.py \
            --verify-package-resolved-transition \
            "$RUNNER_TEMP/base.Package.resolved" \
            "$RUNNER_TEMP/head.Package.resolved"
          python3 -I Scripts/generate_dependency_snapshot.py \
            --package-resolved \
            "$RUNNER_TEMP/head.Package.resolved" \
            "$RUNNER_TEMP/snapshot.json"

      - name: Submit dependency snapshot
        if: steps.fetch.outputs.current == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_json="$RUNNER_TEMP/pr-before-submit.json"
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" > "$pr_json"
          if ! jq -e \
              --arg sha "$PR_HEAD_SHA" \
              --arg base_sha "$PR_BASE_SHA" \
              '.state == "open"
               and .head.sha == $sha
               and .base.sha == $base_sha
               and .base.ref == "main"' \
              "$pr_json" >/dev/null; then
            echo "::notice::PR moved while the snapshot was generated; not submitting."
            exit 0
          fi

          expected_ref="refs/pull/$PR_NUMBER/head"
          pin_count="$(jq '.pins | length' "$RUNNER_TEMP/head.Package.resolved")"
          snapshot_count="$(
            jq '.manifests["Package.resolved"].resolved | length' \
              "$RUNNER_TEMP/snapshot.json"
          )"
          jq -e \
            --arg sha "$PR_HEAD_SHA" \
            --arg ref "$expected_ref" \
            '.version == 0
             and .sha == $sha
             and .ref == $ref
             and (.manifests["Package.resolved"].resolved | length > 0)' \
            "$RUNNER_TEMP/snapshot.json" >/dev/null
          test "$pin_count" -eq "$snapshot_count"

          response="$RUNNER_TEMP/submission-response.json"
          gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/dependency-graph/snapshots" \
            --input "$RUNNER_TEMP/snapshot.json" > "$response"
          jq -e '.result == "ACCEPTED" or .result == "SUCCESS"' "$response" >/dev/null
