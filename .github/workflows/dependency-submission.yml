name: Swift Dependency Submission

on:
  push:
    branches: [main]
    paths:
      - Package.swift
      - Package.resolved
      - Scripts/generate-sbom.sh
      - Scripts/generate_dependency_snapshot.py
      - Scripts/tests/test_generate_dependency_snapshot.sh
      - .github/workflows/dependency-submission.yml
  workflow_dispatch:

concurrency:
  group: swift-dependency-submission-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  submit:
    name: Submit Swift Dependencies
    if: github.ref == 'refs/heads/main'
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Verify dependency snapshot fixtures
        run: bash Scripts/tests/test_generate_dependency_snapshot.sh

      - name: Resolve dependencies
        run: xcrun swift package --disable-automatic-resolution resolve

      - name: Verify resolved dependency lock
        run: |
          test -f Package.resolved
          git ls-files --error-unmatch Package.resolved >/dev/null
          git diff --exit-code -- Package.resolved

      - name: Generate dependency snapshot
        env:
          SBOM_VERSION: ${{ github.sha }}
        run: |
          output_root="$RUNNER_TEMP/innonetwork-dependency-submission"
          mkdir -p "$output_root"
          bash Scripts/generate-sbom.sh "$output_root/sbom.cdx.json"
          python3 Scripts/generate_dependency_snapshot.py \
            "$output_root/sbom.cdx.json" \
            "$output_root/snapshot.json"

      - name: Submit dependency snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          output_root="$RUNNER_TEMP/innonetwork-dependency-submission"
          response="$output_root/response.json"
          gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/dependency-graph/snapshots" \
            --input "$output_root/snapshot.json" > "$response"
          jq -e '.result == "SUCCESS"' "$response" >/dev/null
