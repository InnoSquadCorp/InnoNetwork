name: Swift Dependency Submission

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Every main SHA is a valid future PR base and therefore needs its own snapshot.
  group: swift-dependency-submission-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  submit:
    name: Submit Swift Dependencies
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Verify dependency snapshot fixtures
        run: bash Scripts/tests/test_generate_dependency_snapshot.sh

      - name: Verify resolved dependency lock
        run: |
          test -f Package.resolved
          git ls-files --error-unmatch Package.resolved >/dev/null

      - name: Generate dependency snapshot
        run: |
          output_root="$RUNNER_TEMP/innonetwork-dependency-submission"
          mkdir -p "$output_root"
          python3 Scripts/generate_dependency_snapshot.py \
            --package-resolved \
            Package.resolved \
            "$output_root/snapshot.json"

      - name: Submit dependency snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          output_root="$RUNNER_TEMP/innonetwork-dependency-submission"
          response="$output_root/response.json"
          gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/dependency-graph/snapshots" \
            --input "$output_root/snapshot.json" > "$response"
          jq -e '.result == "SUCCESS"' "$response" >/dev/null
