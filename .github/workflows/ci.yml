name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (SwiftPM)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (strict concurrency)
        run: swift build -Xswiftc -strict-concurrency=complete

      - name: Test
        run: swift test

      - name: Enforce no unchecked sendable in production sources
        run: |
          if rg -n "@unchecked Sendable" Sources; then
            echo "Found forbidden @unchecked Sendable in Sources"
            exit 1
          fi
