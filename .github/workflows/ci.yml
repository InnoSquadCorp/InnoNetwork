name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Review dependency changes
        # GitHub's dependency-review API requires the repository dependency
        # graph setting to be enabled. Keep the signal visible without
        # blocking PRs until the org-level setting is turned on.
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  lint:
    name: Lint (swift-format)
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show swift-format version
        run: xcrun swift-format --version

      - name: Run swift-format lint
        run: bash Scripts/format.sh --lint

  build-and-test:
    name: Build and Test (SwiftPM)
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build (Swift 6 language mode)
        run: |
          set -eo pipefail
          echo "🔨 Building InnoNetwork..."
          xcrun swift --version
          # Swift 6 language mode is enabled per-target in Package.swift, so
          # strict concurrency is always in effect without an explicit flag.
          xcrun swift build
          echo "✅ Build completed successfully!"

      - name: Test (with code coverage)
        run: |
          set -eo pipefail
          echo "🧪 Running tests with --enable-code-coverage..."
          # Coverage instrumentation makes the macOS Actions runner much more
          # scheduler-sensitive; keep this run non-parallel so wall-clock
          # polling tests do not starve under runner load.
          xcrun swift test --no-parallel --enable-code-coverage
          echo "✅ Tests completed successfully!"

      - name: Generate coverage report
        run: |
          set -eo pipefail
          # Resolve all .xctest binaries and the merged profdata under the
          # SwiftPM build root. The exact paths are platform/version-dependent
          # so we discover them dynamically.
          profdata="$(find .build -name 'default.profdata' -type f | head -n 1)"
          llvm_cov_objects=()
          while IFS= read -r -d '' xctest_bundle; do
            binary="$xctest_bundle/Contents/MacOS/$(basename "$xctest_bundle" .xctest)"
            if [[ -x "$binary" ]]; then
              llvm_cov_objects+=(--object "$binary")
            fi
          done < <(find .build -name '*.xctest' -type d -print0)

          if [[ -z "$profdata" || ${#llvm_cov_objects[@]} -eq 0 ]]; then
            echo "::warning::Coverage artifacts not found; skipping report."
            exit 0
          fi

          mkdir -p .build/coverage
          xcrun llvm-cov report \
            --instr-profile="$profdata" \
            --use-color=false \
            --ignore-filename-regex='(^|/)(\.build|Tests|SmokeTests|Examples|Benchmarks)/' \
            "${llvm_cov_objects[@]}" | tee .build/coverage/summary.txt

          xcrun llvm-cov export \
            --instr-profile="$profdata" \
            --format=lcov \
            --ignore-filename-regex='(^|/)(\.build|Tests|SmokeTests|Examples|Benchmarks)/' \
            "${llvm_cov_objects[@]}" > .build/coverage/coverage.lcov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: innonetwork-coverage
          path: .build/coverage/

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: .build/coverage/coverage.lcov
          fail_ci_if_error: false

      - name: Enforce no unchecked sendable in production sources
        run: |
          set -eo pipefail
          # Scope the check to the four shipping library targets so the
          # package-internal `InnoNetworkTestSupport` target (test helpers
          # like TestClock that legitimately use `@unchecked Sendable`) is
          # excluded. No product-library depends on InnoNetworkTestSupport,
          # so external consumers never see those symbols.
          production_paths=(
            Sources/InnoNetwork
            Sources/InnoNetworkDownload
            Sources/InnoNetworkPersistentCache
            Sources/InnoNetworkWebSocket
          )
          temp_matches="$(mktemp)"

          if command -v rg > /dev/null 2>&1; then
            rg -n "@unchecked Sendable" "${production_paths[@]}" > "$temp_matches" || true
          else
            grep -R -n "@unchecked Sendable" "${production_paths[@]}" > "$temp_matches" || true
          fi

          if [[ -s "$temp_matches" ]]; then
            echo "Found @unchecked Sendable usage in production sources:"
            cat "$temp_matches"
            exit 1
          fi

      - name: Enforce no force unwrap in production sources
        run: bash Scripts/check_production_force_unwraps.sh

  docs-contract-sync:
    name: Docs / Contract Sync
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Verify docs and stability contract
        run: bash Scripts/check_docs_contract_sync.sh

      - name: Build documentation smoke target
        run: xcrun swift build --target InnoNetworkDocSmoke

      - name: Run documentation smoke target
        run: xcrun swift run InnoNetworkDocSmoke

  apple-platform-build-smoke:
    name: Apple Platform Build Smoke
    runs-on: macos-15
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - destination: "platform=macOS"
            runtime: "macOS"
            sdk: "macosx"
            required: true
          - destination: "generic/platform=iOS Simulator"
            runtime: "iOS"
            sdk: "iphonesimulator"
            required: true
          - destination: "generic/platform=tvOS Simulator"
            runtime: "tvOS"
            sdk: "appletvsimulator"
            required: false
          - destination: "generic/platform=watchOS Simulator"
            runtime: "watchOS"
            sdk: "watchsimulator"
            required: false
          - destination: "generic/platform=visionOS Simulator"
            runtime: "visionOS"
            sdk: "xrsimulator"
            required: false

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version
          xcrun simctl list devicetypes

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build package for destination
        run: |
          runtime="${{ matrix.runtime }}"
          sdk="${{ matrix.sdk }}"
          required="${{ matrix.required }}"
          destination="${{ matrix.destination }}"

          if [[ "$runtime" != "macOS" ]]; then
            if ! xcodebuild -showsdks | awk -v sdk="$sdk" '$0 ~ "-sdk " sdk { found = 1 } END { exit found ? 0 : 1 }'; then
              if [[ "$required" == "true" ]]; then
                echo "::error::Required simulator SDK $sdk is not installed on this runner."
                exit 1
              fi
              echo "::notice::Skipping optional $runtime smoke because simulator SDK $sdk is not installed on this runner."
              exit 0
            fi

            if ! xcrun simctl list runtimes | awk -v runtime="$runtime" '$0 ~ "^" runtime " " && $0 !~ /unavailable/ { found = 1 } END { exit found ? 0 : 1 }'; then
              if [[ "$required" == "true" ]]; then
                echo "::error::Required simulator runtime $runtime is not installed on this runner."
                exit 1
              fi
              echo "::notice::Skipping optional $runtime smoke because the runtime is not installed on this runner."
              exit 0
            fi

            destination_platform="$runtime Simulator"
            destination_listing="$(xcodebuild -scheme InnoNetwork-Package -destination "$destination" -showdestinations 2>&1 || true)"
            if ! printf '%s\n' "$destination_listing" | awk -v platform="platform:$destination_platform" '
              /Available destinations/ { in_available = 1; next }
              /Ineligible destinations/ { in_available = 0 }
              in_available && index($0, platform) && $0 !~ /variant:/ { found = 1 }
              END { exit found ? 0 : 1 }
            '; then
              if [[ "$required" == "true" ]]; then
                echo "::error::Required destination $destination is not available on this runner."
                printf '%s\n' "$destination_listing"
                exit 1
              fi
              echo "::notice::Skipping optional $runtime smoke because destination $destination is not available on this runner."
              exit 0
            fi
          fi

          xcodebuild \
            -scheme InnoNetwork-Package \
            -destination "$destination" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -derivedDataPath build/apple-platform-smoke \
            build

  consumer-smoke:
    name: Consumer Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Verify root package stays runtime-only
        run: |
          set -eo pipefail
          mkdir -p .build
          xcrun swift package show-dependencies | tee .build/root-dependencies.txt
          if grep -q "swift-syntax" .build/root-dependencies.txt; then
            echo "::error::Root InnoNetwork package must not resolve swift-syntax; codegen lives in Packages/InnoNetworkCodegen."
            exit 1
          fi

      - name: Build core-only consumer smoke package
        working-directory: Examples/CoreSmoke
        run: xcrun swift build

      - name: Build aggregate consumer smoke package
        working-directory: Examples/ConsumerSmoke
        run: xcrun swift build

      - name: Build wrapper consumer smoke package
        working-directory: Examples/WrapperSmoke
        run: xcrun swift build

      - name: Build download-only consumer smoke package
        working-directory: Examples/DownloadManager
        run: xcrun swift build

      - name: Build websocket-only consumer smoke package
        working-directory: Examples/WebSocketChat
        run: xcrun swift build

      - name: Build test-support consumer smoke package
        working-directory: Examples/TestSupportSmoke
        run: xcrun swift build

      - name: Build generated client recipe package
        working-directory: Examples/GeneratedClientRecipe
        run: xcrun swift build

      - name: Test codegen package
        run: xcrun swift test --package-path Packages/InnoNetworkCodegen --filter MacroExpansionTests

      - name: Build macro usage package
        working-directory: Examples/MacroUsage
        run: xcrun swift build

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run benchmark smoke guard
        run: |
          mkdir -p .build/benchmarks
          status=1
          for attempt in 1 2 3; do
            echo "Benchmark smoke attempt ${attempt}/3"
            if xcrun swift run InnoNetworkBenchmarks \
              --quick \
              --json-path .build/benchmarks/results.json \
              --enforce-baseline \
              --guard-benchmark events/task-event-fanout-single \
              --guard-benchmark persistence/download-persistence-restore \
              --guard-benchmark persistence/append-log-compaction \
              --guard-benchmark websocket/websocket-close-disposition-classify \
              --guard-benchmark websocket/websocket-ping-context-alloc \
              --guard-benchmark websocket/websocket-send-queue-reserve \
              --guard-benchmark websocket/websocket-lifecycle-transition-table \
              --guard-benchmark client/request-pipeline \
              --guard-benchmark client/request-coalescing-shared-get \
              --guard-benchmark client/decoding-interceptor-chain-1 \
              --guard-benchmark client/decoding-interceptor-chain-3 \
              --guard-benchmark client/decoding-interceptor-chain-8 \
              --guard-benchmark cache/response-cache-lookup \
              --guard-benchmark cache/response-cache-revalidation \
              --max-regression-percent 20; then
              exit 0
            else
              status=$?
            fi
            echo "::warning::Benchmark smoke attempt ${attempt} failed with exit code ${status}; retrying to smooth hosted-runner microbenchmark noise."
          done
          exit "$status"

      - name: Upload benchmark smoke artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: innonetwork-benchmark-smoke
          path: .build/benchmarks/results.json
