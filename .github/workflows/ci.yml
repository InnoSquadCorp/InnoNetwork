name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout trusted dependency verifier
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false
          submodules: false
          lfs: false

      - name: Verify immutable dependency transition
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          test "$(git rev-parse HEAD)" = "$BASE_SHA"
          gh api \
            --method GET \
            -H 'Accept: application/vnd.github.raw+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/contents/Package.resolved" \
            -f ref="$HEAD_SHA" > "$RUNNER_TEMP/head.Package.resolved"
          python3 -I Scripts/generate_dependency_snapshot.py \
            --verify-package-resolved-transition \
            Package.resolved \
            "$RUNNER_TEMP/head.Package.resolved"

      - name: Wait for complete dependency snapshots
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 18); do
            headers="$RUNNER_TEMP/dependency-review-$attempt.headers"
            body="$RUNNER_TEMP/dependency-review-$attempt.json"
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --retry 3 \
              --dump-header "$headers" \
              --output "$body" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'Cache-Control: no-cache' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/dependency-graph/compare/$BASE_SHA...$HEAD_SHA"

            if python3 - "$headers" "$body" <<'PY'
          import base64
          import json
          import sys
          from pathlib import Path

          headers = {}
          for line in Path(sys.argv[1]).read_text(encoding="utf-8").splitlines():
              name, separator, value = line.partition(":")
              if separator:
                  headers[name.lower()] = value.strip()

          warning_header = "x-github-dependency-graph-snapshot-warnings"
          if warning_header not in headers:
              print("Dependency graph response omitted the snapshot warning header.")
              raise SystemExit(1)
          try:
              warning = base64.b64decode(headers[warning_header], validate=True).decode()
          except (ValueError, UnicodeError) as error:
              print(f"Dependency graph returned an invalid snapshot warning: {error}")
              raise SystemExit(1)

          with Path(sys.argv[2]).open(encoding="utf-8") as source:
              changes = json.load(source)
          if not isinstance(changes, list):
              print("Dependency graph comparison response is not an array.")
              raise SystemExit(1)
          if warning:
              print(f"Dependency snapshots are not ready: {warning}")
              raise SystemExit(1)
          print(f"Dependency snapshots are complete ({len(changes)} change(s)).")
          PY
            then
              break
            fi

            if [[ "$attempt" -eq 18 ]]; then
              echo "::error::Dependency snapshots remained incomplete for 180 seconds."
              exit 1
            fi
            sleep 10
          done

      - name: Review dependency changes
        # GitHub's dependency-review API requires the repository dependency
        # graph setting to be enabled. A missing graph or a rejected dependency
        # change is a required PR gate rather than an advisory signal.
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}
          fail-on-severity: low
          fail-on-scopes: runtime, development, unknown
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 180

  lint:
    name: Lint (swift-format)
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show swift-format version
        run: xcrun swift-format --version

      - name: Run swift-format lint
        run: bash Scripts/format.sh --lint

  dead-code:
    name: Lint (Periphery)
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Install Periphery 3.7.4
        env:
          PERIPHERY_VERSION: "3.7.4"
          PERIPHERY_SHA256: "f8283239a82c638a4d5cfb91c42519980462b7853299562f663eb33ce54c8dc6"
        run: |
          set -euo pipefail

          archive="$RUNNER_TEMP/periphery-$PERIPHERY_VERSION.zip"
          install_dir="$RUNNER_TEMP/periphery-$PERIPHERY_VERSION"

          curl --fail --location --proto '=https' --tlsv1.2 --retry 3 \
            --output "$archive" \
            "https://github.com/peripheryapp/periphery/releases/download/$PERIPHERY_VERSION/periphery-$PERIPHERY_VERSION.zip"

          printf '%s  %s\n' "$PERIPHERY_SHA256" "$archive" \
            | shasum -a 256 -c -

          mkdir -p "$install_dir"
          ditto -x -k "$archive" "$install_dir"

          codesign --verify --strict "$install_dir/periphery"
          codesign --verify --strict "$install_dir/libIndexStore.dylib"

          actual_version="$("$install_dir/periphery" version)"
          test "$actual_version" = "$PERIPHERY_VERSION"
          echo "Periphery $actual_version"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run Periphery scan
        run: |
          set -eo pipefail
          periphery scan --config .periphery.yml

  build-and-test:
    name: Build and Test (SwiftPM) — Xcode ${{ matrix.xcode.label }}
    runs-on: macos-15
    timeout-minutes: 45
    # Run the toolchain matrix in parallel so a green / red signal is
    # available per Xcode without serializing wall-clock time.
    strategy:
      fail-fast: false
      matrix:
        xcode:
          # Pinned canonical toolchain — the source of truth for `swift
          # build` reproducibility and the version benchmarked / signed
          # in the release workflow.
          - label: "26.0.1"
            path: /Applications/Xcode_26.0.1.app
            required: true
          # Runner-default Xcode (symlinked at /Applications/Xcode.app).
          # Treated as an early-warning channel — when GitHub bumps the
          # default past 26.0.1 we want a build signal before adoption,
          # not a surprise at upgrade time. Failures are non-blocking
          # until the team pins the next canonical version.
          - label: "runner-default"
            path: /Applications/Xcode.app
            required: false
    continue-on-error: ${{ !matrix.xcode.required }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s ${{ matrix.xcode.path }}

      - name: Cache SwiftPM artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-xcode-${{ matrix.xcode.label }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ matrix.xcode.label }}-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Check Swift tools compatibility
        id: toolchain-compatibility
        env:
          REQUIRED_TOOLCHAIN: ${{ matrix.xcode.required }}
        run: |
          set -eo pipefail

          package_tools="$(sed -nE 's#^// swift-tools-version: *([0-9]+)\.([0-9]+).*#\1.\2#p' Package.swift | head -n 1)"
          swift_version="$(xcrun swift --version | sed -nE 's/^Apple Swift version ([0-9]+)\.([0-9]+).*/\1.\2/p' | head -n 1)"

          if [[ -z "$package_tools" || -z "$swift_version" ]]; then
            echo "::error::Unable to determine Package.swift tools version or active Swift version."
            exit 1
          fi

          tools_major="${package_tools%%.*}"
          tools_minor="${package_tools##*.}"
          swift_major="${swift_version%%.*}"
          swift_minor="${swift_version##*.}"

          if (( swift_major > tools_major || (swift_major == tools_major && swift_minor >= tools_minor) )); then
            echo "compatible=true" >> "$GITHUB_OUTPUT"
            echo "Active Swift ${swift_version} supports Package.swift tools ${package_tools}."
          elif [[ "$REQUIRED_TOOLCHAIN" == "true" ]]; then
            echo "compatible=false" >> "$GITHUB_OUTPUT"
            echo "::error::Required toolchain Swift ${swift_version} cannot load Package.swift tools ${package_tools}."
            exit 1
          else
            echo "compatible=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping non-required ${GITHUB_JOB} matrix leg because Swift ${swift_version} cannot load Package.swift tools ${package_tools}."
          fi

      - name: Resolve dependencies
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: xcrun swift package resolve

      - name: Verify resolved dependency lock
        if: matrix.xcode.required == true && steps.toolchain-compatibility.outputs.compatible == 'true'
        run: |
          test -f Package.resolved
          git ls-files --error-unmatch Package.resolved >/dev/null
          git diff --exit-code -- Package.resolved

      - name: Verify resolved dependency snapshot
        if: matrix.xcode.required == true && steps.toolchain-compatibility.outputs.compatible == 'true'
        run: |
          output_root="$RUNNER_TEMP/innonetwork-dependency-dry-run"
          mkdir -p "$output_root"
          python3 Scripts/generate_dependency_snapshot.py \
            --package-resolved \
            Package.resolved \
            "$output_root/snapshot.json"

      - name: Build (Swift 6 language mode)
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: |
          set -eo pipefail
          echo "🔨 Building InnoNetwork..."
          xcrun swift --version
          # Swift 6 language mode is enabled per-target in Package.swift, so
          # strict concurrency is always in effect without an explicit flag.
          xcrun swift build
          echo "✅ Build completed successfully!"

      - name: Test (with code coverage)
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: |
          set -eo pipefail
          echo "🧪 Running tests with --enable-code-coverage..."
          # Coverage instrumentation makes the macOS Actions runner much more
          # scheduler-sensitive; keep this run non-parallel so wall-clock
          # polling tests do not starve under runner load.
          xcrun swift test --no-parallel --enable-code-coverage
          echo "✅ Tests completed successfully!"

      - name: Generate runtime coverage report
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: |
          set -euo pipefail

          runtime_source_roots=()
          while IFS= read -r source_root; do
            runtime_source_roots+=("$source_root")
          done < <(
            find Sources -mindepth 1 -maxdepth 1 -type d \
              ! -name InnoNetworkMacros -print | sort
          )

          bash Scripts/generate_coverage_report.sh \
            .build \
            .build/coverage \
            "${runtime_source_roots[@]}"

      - name: Upload coverage artifact
        if: always() && steps.toolchain-compatibility.outputs.compatible == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Suffix the artifact name with the matrix label so the
          # parallel toolchain runs do not race on a shared upload
          # slot.
          name: innonetwork-coverage-${{ matrix.xcode.label }}
          path: .build/coverage/
          if-no-files-found: error

      - name: Enforce @unchecked Sendable policy
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: bash Scripts/check_unchecked_sendable.sh

      - name: Enforce SharedCoders immutability
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: bash Scripts/check_shared_coders_mutation.sh

      - name: Enforce no force unwrap in production sources
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: bash Scripts/check_production_force_unwraps.sh

      - name: Enforce no print() in production sources
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: bash Scripts/check_no_print_in_production.sh

  upload-core-coverage:
    name: Upload Core Coverage
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download canonical coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: innonetwork-coverage-26.0.1
          path: .build/coverage

      - name: Install Codecov CLI v11.3.1
        id: install-codecov-cli
        continue-on-error: ${{ !(github.event_name == 'push' && github.repository == 'InnoSquadCorp/InnoNetwork') }}
        env:
          CODECOV_CLI_VERSION: "v11.3.1"
          CODECOV_CLI_SHA256: "ca1d64196d2d34771084afe76ea657d581bf628e31d993ff8e52ea09cc88a56d"
        run: |
          set -euo pipefail

          binary="$RUNNER_TEMP/codecov-$CODECOV_CLI_VERSION"
          curl --fail --location --proto '=https' --tlsv1.2 --retry 3 \
            --output "$binary" \
            "https://cli.codecov.io/$CODECOV_CLI_VERSION/linux/codecov"
          printf '%s  %s\n' "$CODECOV_CLI_SHA256" "$binary" \
            | sha256sum -c -
          chmod 0755 "$binary"
          "$binary" --version

      - name: Report artifact-only Codecov fallback
        if: ${{ always() && steps.install-codecov-cli.outcome != 'success' }}
        run: echo "::notice::Codecov CLI installation failed; retaining the uploaded coverage artifact without a Codecov upload."

      - name: Upload coverage to Codecov
        if: steps.install-codecov-cli.outcome == 'success'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          binary: ${{ runner.temp }}/codecov-v11.3.1
          use_oidc: true
          files: .build/coverage/coverage.lcov
          disable_search: true
          flags: core
          name: core-coverage
          # Fail the build when upload fails on canonical main pushes so a
          # Codecov outage does not silently drop coverage from the project
          # gate. PRs keep the artifact-only fallback non-blocking.
          fail_ci_if_error: ${{ github.event_name == 'push' && github.repository == 'InnoSquadCorp/InnoNetwork' }}

  parallel-tests:
    name: Test (Bounded Target Shards) — Xcode 26.0.1
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-bounded-shards-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-bounded-shards-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run bounded target-sharded tests
        run: |
          set -eo pipefail
          # Swift Testing 6.2 ignores SwiftPM's --num-workers value. Keep the
          # coverage lane serial, then load four target-filtered copies of the
          # built test bundle so hosted concurrency is actually bound.
          bash Scripts/run_bounded_parallel_tests.sh

  docs-contract-sync:
    name: Docs / Contract Sync
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Verify docs and stability contract
        run: bash Scripts/check_docs_contract_sync.sh

      - name: Verify guarded benchmark contract
        run: |
          bash Scripts/check_guarded_benchmark_contract.sh
          bash Scripts/tests/test_check_guarded_benchmark_contract.sh
          python3 Scripts/tests/test_run_with_guarded_benchmarks.py

      - name: Verify repeated macro build baselines
        run: |
          python3 Scripts/check_macro_build_baseline_contract.py
          python3 Scripts/tests/test_check_macro_build_baseline_contract.py

      - name: Verify dependency snapshot conversion
        run: bash Scripts/tests/test_generate_dependency_snapshot.sh

      - name: Verify local release preflight contract
        run: bash Scripts/tests/test_run_local_release_preflight.sh

      - name: Verify DocC archive contract
        run: bash Scripts/tests/test_check_docc_archives.sh

      - name: Verify stable examples contract
        run: bash Scripts/check_stable_examples.sh

      - name: Verify example deployment floors
        run: |
          python3 Scripts/check_example_platform_floors.py
          python3 Scripts/tests/test_check_example_platform_floors.py
          bash Scripts/tests/test_build_consumer_examples.sh
          python3 Scripts/check_apple_platform_build_contract.py
          python3 Scripts/tests/test_check_apple_platform_build_contract.py

      - name: Verify migration guide code blocks compile
        run: bash Scripts/check_migration_examples.sh

      - name: Verify CHANGELOG Unreleased section
        run: bash Scripts/check_changelog_sync.sh

      - name: Verify provisionally stable enum case ledger
        run: bash Scripts/check_provisional_enum_cases.sh

      - name: Build documentation smoke target
        run: xcrun swift build --target InnoNetworkDocSmoke

      - name: Run documentation smoke target
        run: xcrun swift run InnoNetworkDocSmoke

  apple-platform-build-smoke:
    name: Apple Platform Build Smoke
    runs-on: macos-15
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        # Every declared platform is an unconditional hard gate.
        include:
          - destination: "platform=macOS"
            runtime: "macOS"
            sdk: "macosx"
            builder: "xcodebuild"
          - destination: "generic/platform=iOS Simulator"
            runtime: "iOS"
            sdk: "iphonesimulator"
            builder: "xcodebuild"
          - triple: "arm64-apple-tvos16.0"
            runtime: "tvOS"
            sdk: "appletvos"
            builder: "swiftpm-cross"
          - triple: "arm64_32-apple-watchos9.0"
            runtime: "watchOS"
            sdk: "watchos"
            builder: "swiftpm-cross"
          - triple: "arm64-apple-xros1.0"
            runtime: "visionOS"
            sdk: "xros"
            builder: "swiftpm-cross"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version
          xcrun simctl list devicetypes

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build package for ${{ matrix.runtime }}
        run: |
          set -euo pipefail

          runtime="${{ matrix.runtime }}"
          sdk="${{ matrix.sdk }}"
          builder="${{ matrix.builder }}"

          if ! xcrun --sdk "$sdk" --show-sdk-path >/dev/null 2>&1; then
            echo "::error::Required $runtime SDK $sdk is not installed on the pinned runner."
            exit 1
          fi

          if [[ "$builder" == "swiftpm-cross" ]]; then
            bash Scripts/build_apple_platform_targets.sh \
              "$runtime" \
              "$sdk" \
              '${{ matrix.triple }}'
            exit 0
          fi

          xcodebuild \
            -scheme InnoNetwork-Package \
            -destination '${{ matrix.destination }}' \
            -skipMacroValidation \
            -derivedDataPath build/apple-platform-smoke \
            CODE_SIGNING_ALLOWED=NO \
            build

  consumer-smoke:
    name: Consumer Smoke
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Verify macro trait manifest and default graph
        run: bash Scripts/check_macro_trait_graphs.sh

      - name: Build root core without default traits
        run: bash Scripts/check_core_trait_build.sh

      - name: Build all independent consumer examples
        run: bash Scripts/build_consumer_examples.sh

      - name: Run macro adopter smoke
        run: xcrun swift run --package-path Examples/MacroAdopterSmoke

      - name: Test macros from source (with code coverage)
        run: |
          xcrun swift test \
            --disable-experimental-prebuilts \
            --filter InnoNetworkMacroTests \
            --enable-code-coverage

      - name: Verify macro compile-failure diagnostics
        run: bash Scripts/check_macro_compile_failures.sh

      - name: Generate macro coverage report
        run: |
          bash Scripts/generate_coverage_report.sh \
            .build \
            .build/coverage-macros \
            Sources/InnoNetworkMacros

      - name: Upload macro coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: innonetwork-coverage-macros
          path: .build/coverage-macros/
          if-no-files-found: error

      - name: Build openapi-to-innonetwork CLI
        working-directory: Tools/openapi-to-innonetwork
        run: xcrun swift build

      - name: Test openapi-to-innonetwork CLI
        working-directory: Tools/openapi-to-innonetwork
        run: xcrun swift test

  upload-macro-coverage:
    name: Upload Macro Coverage
    needs: consumer-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download macro coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: innonetwork-coverage-macros
          path: .build/coverage-macros

      - name: Install Codecov CLI v11.3.1
        id: install-codecov-cli
        continue-on-error: ${{ !(github.event_name == 'push' && github.repository == 'InnoSquadCorp/InnoNetwork') }}
        env:
          CODECOV_CLI_VERSION: "v11.3.1"
          CODECOV_CLI_SHA256: "ca1d64196d2d34771084afe76ea657d581bf628e31d993ff8e52ea09cc88a56d"
        run: |
          set -euo pipefail

          binary="$RUNNER_TEMP/codecov-$CODECOV_CLI_VERSION"
          curl --fail --location --proto '=https' --tlsv1.2 --retry 3 \
            --output "$binary" \
            "https://cli.codecov.io/$CODECOV_CLI_VERSION/linux/codecov"
          printf '%s  %s\n' "$CODECOV_CLI_SHA256" "$binary" \
            | sha256sum -c -
          chmod 0755 "$binary"
          "$binary" --version

      - name: Report artifact-only Codecov fallback
        if: ${{ always() && steps.install-codecov-cli.outcome != 'success' }}
        run: echo "::notice::Codecov CLI installation failed; retaining the uploaded coverage artifact without a Codecov upload."

      - name: Upload macro coverage to Codecov
        if: steps.install-codecov-cli.outcome == 'success'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          binary: ${{ runner.temp }}/codecov-v11.3.1
          use_oidc: true
          files: .build/coverage-macros/coverage.lcov
          disable_search: true
          flags: macros
          name: macro-coverage
          fail_ci_if_error: ${{ github.event_name == 'push' && github.repository == 'InnoSquadCorp/InnoNetwork' }}

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run benchmark smoke
        run: |
          mkdir -p .build/benchmarks
          xcrun swift run -c release InnoNetworkBenchmarks \
            --quick \
            --json-path .build/benchmarks/results.json

      - name: Upload benchmark smoke artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: innonetwork-benchmark-smoke
          path: .build/benchmarks/results.json
          if-no-files-found: error
