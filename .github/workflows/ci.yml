name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Review dependency changes
        # GitHub's dependency-review API requires the repository dependency
        # graph setting to be enabled. Keep the signal visible without
        # blocking PRs until the org-level setting is turned on.
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  lint:
    name: Lint (swift-format)
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show swift-format version
        run: xcrun swift-format --version

      - name: Run swift-format lint
        run: bash Scripts/format.sh --lint

  dead-code:
    name: Lint (Periphery)
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Install Periphery
        run: |
          set -eo pipefail
          brew tap peripheryapp/periphery
          brew install periphery
          periphery version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run Periphery scan
        run: |
          set -eo pipefail
          periphery scan --config .periphery.yml

  build-and-test:
    name: Build and Test (SwiftPM) — Xcode ${{ matrix.xcode.label }}
    runs-on: macos-15
    timeout-minutes: 45
    # Run the toolchain matrix in parallel so a green / red signal is
    # available per Xcode without serializing wall-clock time.
    strategy:
      fail-fast: false
      matrix:
        xcode:
          # Pinned canonical toolchain — the source of truth for `swift
          # build` reproducibility and the version benchmarked / signed
          # in the release workflow.
          - label: "26.0.1"
            path: /Applications/Xcode_26.0.1.app
            required: true
          # Runner-default Xcode (symlinked at /Applications/Xcode.app).
          # Treated as an early-warning channel — when GitHub bumps the
          # default past 26.0.1 we want a build signal before adoption,
          # not a surprise at upgrade time. Failures are non-blocking
          # until the team pins the next canonical version.
          - label: "runner-default"
            path: /Applications/Xcode.app
            required: false
    continue-on-error: ${{ !matrix.xcode.required }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s ${{ matrix.xcode.path }}

      - name: Cache SwiftPM artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-xcode-${{ matrix.xcode.label }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ matrix.xcode.label }}-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Check Swift tools compatibility
        id: toolchain-compatibility
        env:
          REQUIRED_TOOLCHAIN: ${{ matrix.xcode.required }}
        run: |
          set -eo pipefail

          package_tools="$(sed -nE 's#^// swift-tools-version: *([0-9]+)\.([0-9]+).*#\1.\2#p' Package.swift | head -n 1)"
          swift_version="$(xcrun swift --version | sed -nE 's/^Apple Swift version ([0-9]+)\.([0-9]+).*/\1.\2/p' | head -n 1)"

          if [[ -z "$package_tools" || -z "$swift_version" ]]; then
            echo "::error::Unable to determine Package.swift tools version or active Swift version."
            exit 1
          fi

          tools_major="${package_tools%%.*}"
          tools_minor="${package_tools##*.}"
          swift_major="${swift_version%%.*}"
          swift_minor="${swift_version##*.}"

          if (( swift_major > tools_major || (swift_major == tools_major && swift_minor >= tools_minor) )); then
            echo "compatible=true" >> "$GITHUB_OUTPUT"
            echo "Active Swift ${swift_version} supports Package.swift tools ${package_tools}."
          elif [[ "$REQUIRED_TOOLCHAIN" == "true" ]]; then
            echo "compatible=false" >> "$GITHUB_OUTPUT"
            echo "::error::Required toolchain Swift ${swift_version} cannot load Package.swift tools ${package_tools}."
            exit 1
          else
            echo "compatible=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping non-required ${GITHUB_JOB} matrix leg because Swift ${swift_version} cannot load Package.swift tools ${package_tools}."
          fi

      - name: Resolve dependencies
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: xcrun swift package resolve

      - name: Build (Swift 6 language mode)
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: |
          set -eo pipefail
          echo "🔨 Building InnoNetwork..."
          xcrun swift --version
          # Swift 6 language mode is enabled per-target in Package.swift, so
          # strict concurrency is always in effect without an explicit flag.
          xcrun swift build
          echo "✅ Build completed successfully!"

      - name: Test (with code coverage)
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: |
          set -eo pipefail
          echo "🧪 Running tests with --enable-code-coverage..."
          # Coverage instrumentation makes the macOS Actions runner much more
          # scheduler-sensitive; keep this run non-parallel so wall-clock
          # polling tests do not starve under runner load.
          xcrun swift test --no-parallel --enable-code-coverage
          echo "✅ Tests completed successfully!"

      - name: Generate coverage report
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: |
          set -eo pipefail
          # Resolve all .xctest binaries and the merged profdata under the
          # SwiftPM build root. The exact paths are platform/version-dependent
          # so we discover them dynamically.
          profdata="$(find .build -name 'default.profdata' -type f | head -n 1)"
          llvm_cov_objects=()
          while IFS= read -r -d '' xctest_bundle; do
            binary="$xctest_bundle/Contents/MacOS/$(basename "$xctest_bundle" .xctest)"
            if [[ -x "$binary" ]]; then
              llvm_cov_objects+=(--object "$binary")
            fi
          done < <(find .build -name '*.xctest' -type d -print0)

          if [[ -z "$profdata" || ${#llvm_cov_objects[@]} -eq 0 ]]; then
            echo "::warning::Coverage artifacts not found; skipping report."
            exit 0
          fi

          mkdir -p .build/coverage
          xcrun llvm-cov report \
            --instr-profile="$profdata" \
            --use-color=false \
            --ignore-filename-regex='(^|/)(\.build|Tests|SmokeTests|Examples|Benchmarks)/' \
            "${llvm_cov_objects[@]}" | tee .build/coverage/summary.txt

          xcrun llvm-cov export \
            --instr-profile="$profdata" \
            --format=lcov \
            --ignore-filename-regex='(^|/)(\.build|Tests|SmokeTests|Examples|Benchmarks)/' \
            "${llvm_cov_objects[@]}" > .build/coverage/coverage.lcov

      - name: Upload coverage artifact
        if: always() && steps.toolchain-compatibility.outputs.compatible == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Suffix the artifact name with the matrix label so the
          # parallel toolchain runs do not race on a shared upload
          # slot.
          name: innonetwork-coverage-${{ matrix.xcode.label }}
          path: .build/coverage/

      - name: Detect Codecov token
        id: codecov-token
        if: matrix.xcode.required && steps.toolchain-compatibility.outputs.compatible == 'true'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [[ -n "${CODECOV_TOKEN:-}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      # Codecov uploads are optional on PRs because secrets can be absent or
      # intentionally withheld. The coverage artifact above is still always
      # uploaded. Main pushes in the canonical repository keep the stricter
      # token requirement so the published badge and project gate do not drift.
      - name: Require Codecov token on canonical main builds
        # Only the pinned canonical toolchain uploads coverage. The
        # runner-default matrix entry exists for an early-warning
        # signal on toolchain bumps; doubling its coverage upload
        # against the same commit would skew the Codecov report.
        if: matrix.xcode.required && steps.toolchain-compatibility.outputs.compatible == 'true' && github.event_name == 'push' && github.repository == 'InnoSquadCorp/InnoNetwork' && steps.codecov-token.outputs.present != 'true'
        run: |
          echo "::error::CODECOV_TOKEN secret is missing on a canonical main build." \
            "Codecov uploads are required so the badge and project gate stay" \
            "trustworthy. Configure the secret or, if intentional, gate this" \
            "step explicitly."
          exit 1

      - name: Upload coverage to Codecov
        if: matrix.xcode.required && steps.toolchain-compatibility.outputs.compatible == 'true' && steps.codecov-token.outputs.present == 'true'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: .build/coverage/coverage.lcov
          # Fail the build when upload fails on canonical main pushes so a
          # Codecov outage does not silently drop coverage from the project
          # gate. PRs keep the artifact-only fallback non-blocking.
          fail_ci_if_error: ${{ github.event_name == 'push' && github.repository == 'InnoSquadCorp/InnoNetwork' }}

      - name: Enforce @unchecked Sendable policy
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: bash Scripts/check_unchecked_sendable.sh

      - name: Enforce SharedCoders immutability
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: bash Scripts/check_shared_coders_mutation.sh

      - name: Enforce no force unwrap in production sources
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: bash Scripts/check_production_force_unwraps.sh

      - name: Enforce no print() in production sources
        if: steps.toolchain-compatibility.outputs.compatible == 'true'
        run: bash Scripts/check_no_print_in_production.sh

  parallel-tests:
    name: Test (SwiftPM Parallel) — Xcode 26.0.1
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-parallel-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-parallel-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run tests with parallel scheduling
        run: |
          set -eo pipefail
          # Keep the coverage lane deterministic and serial, while this
          # blocking lane exposes scheduler-sensitive races on every change.
          xcrun swift test --parallel

  docs-contract-sync:
    name: Docs / Contract Sync
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Verify docs and stability contract
        run: bash Scripts/check_docs_contract_sync.sh

      - name: Verify stable examples contract
        run: bash Scripts/check_stable_examples.sh

      - name: Verify migration guide code blocks compile
        run: bash Scripts/check_migration_examples.sh

      - name: Verify CHANGELOG Unreleased section
        run: bash Scripts/check_changelog_sync.sh

      - name: Verify provisionally stable enum case ledger
        run: bash Scripts/check_provisional_enum_cases.sh

      - name: Build documentation smoke target
        run: xcrun swift build --target InnoNetworkDocSmoke

      - name: Run documentation smoke target
        run: xcrun swift run InnoNetworkDocSmoke

  apple-platform-build-smoke:
    name: Apple Platform Build Smoke
    runs-on: macos-15
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - destination: "platform=macOS"
            runtime: "macOS"
            sdk: "macosx"
            required: true
          - destination: "generic/platform=iOS Simulator"
            runtime: "iOS"
            sdk: "iphonesimulator"
            required: true
          - destination: "generic/platform=tvOS Simulator"
            runtime: "tvOS"
            sdk: "appletvsimulator"
            required: true
          - destination: "generic/platform=watchOS Simulator"
            runtime: "watchOS"
            sdk: "watchsimulator"
            required: true
          - destination: "generic/platform=visionOS Simulator"
            runtime: "visionOS"
            sdk: "xrsimulator"
            required: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version
          xcrun simctl list devicetypes

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build package for destination
        run: |
          runtime="${{ matrix.runtime }}"
          sdk="${{ matrix.sdk }}"
          required="${{ matrix.required }}"
          destination="${{ matrix.destination }}"

          if ! xcodebuild -showsdks | awk -v sdk="$sdk" '$0 ~ "-sdk " sdk { found = 1 } END { exit found ? 0 : 1 }'; then
            if [[ "$required" == "true" ]]; then
              echo "::error::Required $runtime SDK $sdk is not installed on the canonical runner."
              exit 1
            fi
            echo "::notice::Skipping optional $runtime smoke because SDK $sdk is not installed on this runner."
            exit 0
          fi

          # These are generic compile destinations; a bootable simulator
          # runtime is not required. xcodebuild remains the source of truth
          # for destination support after the SDK gate above.
          xcodebuild \
            -scheme InnoNetwork-Package \
            -destination "$destination" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -derivedDataPath build/apple-platform-smoke \
            build

  consumer-smoke:
    name: Consumer Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Verify root package does not resolve swift-syntax
        run: |
          set -eo pipefail
          mkdir -p .build
          xcrun swift package show-dependencies | tee .build/root-dependencies.txt
          if grep -q "swift-syntax" .build/root-dependencies.txt; then
            echo "::error::Root InnoNetwork package must not resolve swift-syntax; codegen lives in Packages/InnoNetworkCodegen."
            exit 1
          fi

      - name: Build core-only consumer smoke package
        working-directory: Examples/CoreSmoke
        run: xcrun swift build

      - name: Build aggregate consumer smoke package
        working-directory: Examples/ConsumerSmoke
        run: xcrun swift build

      - name: Build wrapper consumer smoke package
        working-directory: Examples/WrapperSmoke
        run: xcrun swift build

      - name: Build download-only consumer smoke package
        working-directory: Examples/DownloadManager
        run: xcrun swift build

      - name: Build websocket-only consumer smoke package
        working-directory: Examples/WebSocketChat
        run: xcrun swift build

      - name: Build test-support consumer smoke package
        working-directory: Examples/TestSupportSmoke
        run: xcrun swift build

      - name: Build generated client recipe package
        working-directory: Examples/GeneratedClientRecipe
        run: xcrun swift build

      - name: Test codegen package
        run: xcrun swift test --package-path Packages/InnoNetworkCodegen

      - name: Build openapi-to-innonetwork CLI
        working-directory: Tools/openapi-to-innonetwork
        run: xcrun swift build

      - name: Test openapi-to-innonetwork CLI
        working-directory: Tools/openapi-to-innonetwork
        run: xcrun swift test

      - name: Build macro usage package
        working-directory: Examples/MacroUsage
        run: xcrun swift build

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run benchmark smoke
        run: |
          mkdir -p .build/benchmarks
          xcrun swift run InnoNetworkBenchmarks \
            --quick \
            --json-path .build/benchmarks/results.json

      - name: Upload benchmark smoke artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: innonetwork-benchmark-smoke
          path: .build/benchmarks/results.json
