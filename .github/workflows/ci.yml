name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (SwiftPM)
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build (Swift 6 language mode)
        run: |
          set -eo pipefail
          echo "🔨 Building InnoNetwork..."
          xcrun swift --version
          # Swift 6 language mode is enabled per-target in Package.swift, so
          # strict concurrency is always in effect without an explicit flag.
          xcrun swift build
          echo "✅ Build completed successfully!"

      - name: Test (with code coverage)
        run: |
          set -eo pipefail
          echo "🧪 Running tests with --enable-code-coverage..."
          xcrun swift test --parallel --enable-code-coverage
          echo "✅ Tests completed successfully!"

      - name: Generate coverage report
        run: |
          set -eo pipefail
          # Resolve the most recent .xctest binary and merged profdata under
          # the SwiftPM build root. The exact path is platform/version-
          # dependent so we discover it dynamically.
          xctest_bundle="$(find .build -name '*.xctest' -type d | head -n 1)"
          profdata="$(find .build -name 'default.profdata' -type f | head -n 1)"

          if [[ -z "$xctest_bundle" || -z "$profdata" ]]; then
            echo "::warning::Coverage artifacts not found; skipping report."
            exit 0
          fi

          binary="$xctest_bundle/Contents/MacOS/$(basename "$xctest_bundle" .xctest)"
          mkdir -p .build/coverage
          xcrun llvm-cov report \
            --instr-profile="$profdata" \
            --use-color=false \
            --ignore-filename-regex='(^|/)(\.build|Tests|SmokeTests|Examples|Benchmarks)/' \
            "$binary" | tee .build/coverage/summary.txt

          xcrun llvm-cov export \
            --instr-profile="$profdata" \
            --format=lcov \
            --ignore-filename-regex='(^|/)(\.build|Tests|SmokeTests|Examples|Benchmarks)/' \
            "$binary" > .build/coverage/coverage.lcov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: innonetwork-coverage
          path: .build/coverage/

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v4
        with:
          files: .build/coverage/coverage.lcov
          fail_ci_if_error: false

      - name: Enforce no unchecked sendable in production sources
        run: |
          set -eo pipefail
          # Scope the check to the three shipping library targets so the
          # package-internal `InnoNetworkTestSupport` target (test helpers
          # like TestClock that legitimately use `@unchecked Sendable`) is
          # excluded. No product-library depends on InnoNetworkTestSupport,
          # so external consumers never see those symbols.
          production_paths=(
            Sources/InnoNetwork
            Sources/InnoNetworkDownload
            Sources/InnoNetworkWebSocket
          )
          temp_matches="$(mktemp)"

          if command -v rg > /dev/null 2>&1; then
            rg -n "@unchecked Sendable" "${production_paths[@]}" > "$temp_matches" || true
          else
            grep -R -n "@unchecked Sendable" "${production_paths[@]}" > "$temp_matches" || true
          fi

          if [[ -s "$temp_matches" ]]; then
            echo "Found @unchecked Sendable usage in production sources:"
            cat "$temp_matches"
            exit 1
          fi

  docs-contract-sync:
    name: Docs / Contract Sync
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Verify docs and stability contract
        run: bash Scripts/check_docs_contract_sync.sh

      - name: Build documentation smoke target
        run: xcrun swift build --target InnoNetworkDocSmoke

      - name: Run documentation smoke target
        run: xcrun swift run InnoNetworkDocSmoke

  consumer-smoke:
    name: Consumer Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Build consumer smoke package
        working-directory: Examples/ConsumerSmoke
        run: xcrun swift build

      - name: Build wrapper smoke package
        working-directory: Examples/WrapperSmoke
        run: xcrun swift build

      - name: Build generated client recipe package
        working-directory: Examples/GeneratedClientRecipe
        run: xcrun swift build

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run benchmark smoke guard
        run: |
          mkdir -p .build/benchmarks
          # Tightened from 50% → 10% as part of v4.1 risk-mitigation. The
          # guarded benchmarks are stable enough on macos-15 runners that 10%
          # catches genuine regressions without false-positive churn.
          # Increase only with a documented benchmark redesign.
          xcrun swift run InnoNetworkBenchmarks \
            --quick \
            --json-path .build/benchmarks/results.json \
            --enforce-baseline \
            --guard-benchmark websocket/websocket-close-disposition-classify \
            --guard-benchmark websocket/websocket-ping-context-alloc \
            --max-regression-percent 10

      - name: Upload benchmark smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: innonetwork-benchmark-smoke
          path: .build/benchmarks/results.json
