name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (SwiftPM)
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build (strict concurrency)
        run: |
          set -eo pipefail
          echo "🔨 Building InnoNetwork..."
          xcrun swift --version
          xcrun swift build -Xswiftc -strict-concurrency=complete
          echo "✅ Build completed successfully!"

      - name: Test
        run: |
          set -eo pipefail
          echo "🧪 Running tests..."
          xcrun swift test
          echo "✅ Tests completed successfully!"

      - name: Enforce no unchecked sendable in production sources
        run: |
          set -eo pipefail
          temp_matches="$(mktemp)"

          if command -v rg > /dev/null 2>&1; then
            rg -n "@unchecked Sendable" Sources > "$temp_matches" || true
          else
            grep -R -n "@unchecked Sendable" Sources > "$temp_matches" || true
          fi

          if [[ -s "$temp_matches" ]]; then
            echo "Found @unchecked Sendable usage in Sources:"
            cat "$temp_matches"
            exit 1
          fi

  docs-contract-sync:
    name: Docs / Contract Sync
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Verify docs and stability contract
        run: bash Scripts/check_docs_contract_sync.sh

      - name: Build documentation smoke target
        run: xcrun swift build --target InnoNetworkDocSmoke

      - name: Run documentation smoke target
        run: xcrun swift run InnoNetworkDocSmoke

  consumer-smoke:
    name: Consumer Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Build consumer smoke package
        working-directory: Examples/ConsumerSmoke
        run: xcrun swift build

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build benchmark target
        run: xcrun swift build --target InnoNetworkBenchmarks
