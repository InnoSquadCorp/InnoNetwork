name: Release

on:
  push:
    tags:
      - "*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate Release
    runs-on: macos-15
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-release-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-release-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Verify docs and stability contract
        run: bash Scripts/check_docs_contract_sync.sh

      - name: Build and run documentation smoke target
        run: |
          xcrun swift build --target InnoNetworkDocSmoke
          xcrun swift run InnoNetworkDocSmoke

      - name: Build consumer smoke package
        working-directory: Examples/ConsumerSmoke
        run: xcrun swift build

      - name: Run quick benchmarks
        run: |
          mkdir -p .build/release-artifacts
          xcrun swift run InnoNetworkBenchmarks --quick --json-path .build/release-artifacts/benchmarks.json

      - name: Run tests
        run: xcrun swift test

      - name: Build DocC archives
        run: |
          xcodebuild docbuild \
            -scheme InnoNetwork-Package \
            -destination 'generic/platform=macOS' \
            -derivedDataPath .build/DocC

      - name: Generate SBOM (CycloneDX 1.5)
        env:
          SBOM_VERSION: ${{ github.ref_name }}
        run: bash Scripts/generate-sbom.sh .build/release-artifacts/sbom.cdx.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            .build/release-artifacts/benchmarks.json
            .build/release-artifacts/sbom.cdx.json

  publish-release:
    name: Publish Release
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for sigstore keyless signing (OIDC token).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: .release-artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign release artifacts (sigstore keyless)
        # Produces a `<artifact>.sig` (signature) and `<artifact>.crt` (Fulcio
        # certificate) next to each artifact. Verifiable with
        # `cosign verify-blob --certificate=<crt> --signature=<sig>` plus the
        # OIDC issuer / identity flags published in SECURITY.md.
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          for artifact in .release-artifacts/benchmarks.json .release-artifacts/sbom.cdx.json; do
            if [[ ! -f "$artifact" ]]; then
              echo "Missing release artifact: $artifact" >&2
              exit 1
            fi
            cosign sign-blob --yes \
              --output-signature="${artifact}.sig" \
              --output-certificate="${artifact}.crt" \
              "$artifact"
          done

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          notes_source="docs/releases/${version}.md"
          notes_target=".release-artifacts/release-notes.md"

          if [[ -f "$notes_source" ]]; then
            cp "$notes_source" "$notes_target"
          else
            printf '%s\n' \
              "# InnoNetwork ${version}" \
              "" \
              "See CHANGELOG.md for the summarized release history." > "$notes_target"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "notes_path=${notes_target}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: InnoNetwork ${{ steps.notes.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            .release-artifacts/benchmarks.json
            .release-artifacts/benchmarks.json.sig
            .release-artifacts/benchmarks.json.crt
            .release-artifacts/sbom.cdx.json
            .release-artifacts/sbom.cdx.json.sig
            .release-artifacts/sbom.cdx.json.crt
