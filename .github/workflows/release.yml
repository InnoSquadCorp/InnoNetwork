name: Release

on:
  push:
    tags:
      - "*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate Release
    runs-on: macos-15
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Test release artifact scripts
        run: |
          bash Scripts/tests/test_validate_release_ref.sh
          bash Scripts/tests/test_generate_sbom.sh

      - name: Validate release ref
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TAG_REF: ${{ github.ref }}
          RELEASE_REMOTE: origin
          RELEASE_MAIN_REMOTE_REF: refs/heads/main
          RELEASE_MAIN_REF: refs/remotes/origin/main
          RELEASE_FETCH_MAIN: '1'
        run: bash Scripts/validate_release_ref.sh

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-release-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-release-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Verify macro trait manifest and default graph
        run: bash Scripts/check_macro_trait_graphs.sh

      - name: Build root core without default traits
        run: bash Scripts/check_core_trait_build.sh

      - name: Verify docs and stability contract
        run: bash Scripts/check_docs_contract_sync.sh

      - name: Verify stable examples contract
        run: bash Scripts/check_stable_examples.sh

      - name: Verify migration guide code blocks compile
        run: bash Scripts/check_migration_examples.sh

      - name: Verify CHANGELOG Unreleased section
        run: bash Scripts/check_changelog_sync.sh

      - name: Verify provisionally stable enum case ledger
        run: bash Scripts/check_provisional_enum_cases.sh

      - name: Verify macro compile-failure diagnostics
        run: bash Scripts/check_macro_compile_failures.sh

      - name: Enforce @unchecked Sendable policy
        run: bash Scripts/check_unchecked_sendable.sh

      - name: Enforce SharedCoders immutability
        run: bash Scripts/check_shared_coders_mutation.sh

      - name: Enforce no force unwrap in production sources
        run: bash Scripts/check_production_force_unwraps.sh

      - name: Enforce no print() in production sources
        run: bash Scripts/check_no_print_in_production.sh

      - name: Build and run documentation smoke target
        run: |
          xcrun swift build --target InnoNetworkDocSmoke
          xcrun swift run InnoNetworkDocSmoke

      - name: Build consumer smoke package
        working-directory: Examples/ConsumerSmoke
        run: xcrun swift build

      - name: Build core-only consumer smoke package
        working-directory: Examples/CoreSmoke
        run: xcrun swift build

      - name: Build macro usage package
        working-directory: Examples/MacroUsage
        run: xcrun swift build

      - name: Run quick benchmarks
        run: |
          mkdir -p .build/release-artifacts
          xcrun swift run -c release InnoNetworkBenchmarks \
            --quick \
            --json-path .build/release-artifacts/benchmarks.json \
            --enforce-baseline \
            --max-regression-percent 10 \
            --guard-benchmark events/task-event-fanout-single \
            --guard-benchmark persistence/download-persistence-restore \
            --guard-benchmark persistence/append-log-compaction \
            --guard-benchmark websocket/websocket-close-disposition-classify \
            --guard-benchmark websocket/websocket-ping-context-create \
            --guard-benchmark websocket/websocket-send-queue-reserve \
            --guard-benchmark websocket/websocket-lifecycle-transition-table \
            --guard-benchmark client/request-pipeline \
            --guard-benchmark client/request-coalescing-shared-get \
            --guard-benchmark client/decoding-interceptor-chain-1 \
            --guard-benchmark client/decoding-interceptor-chain-3 \
            --guard-benchmark client/decoding-interceptor-chain-8 \
            --guard-benchmark cache/response-cache-lookup \
            --guard-benchmark cache/response-cache-revalidation

      - name: Run serial tests with coverage
        run: xcrun swift test --no-parallel --enable-code-coverage

      - name: Generate runtime coverage report
        run: |
          set -euo pipefail

          runtime_source_roots=()
          while IFS= read -r source_root; do
            runtime_source_roots+=("$source_root")
          done < <(
            find Sources -mindepth 1 -maxdepth 1 -type d \
              ! -name InnoNetworkMacros -print | sort
          )

          bash Scripts/generate_coverage_report.sh \
            .build \
            .build/release-artifacts/coverage-core \
            "${runtime_source_roots[@]}"

      - name: Run bounded target-sharded tests
        run: bash Scripts/run_bounded_parallel_tests.sh

      - name: Run macro tests from source with coverage
        run: |
          xcrun swift test \
            --disable-experimental-prebuilts \
            --filter InnoNetworkMacroTests \
            --enable-code-coverage

      - name: Generate macro coverage report
        run: |
          bash Scripts/generate_coverage_report.sh \
            .build \
            .build/release-artifacts/coverage-macros \
            Sources/InnoNetworkMacros

      - name: Build DocC archives
        run: |
          xcodebuild docbuild \
            -scheme InnoNetwork-Package \
            -destination 'generic/platform=macOS' \
            -skipMacroValidation \
            -derivedDataPath .build/DocC

      - name: Generate SBOMs (CycloneDX 1.5)
        env:
          SBOM_VERSION: ${{ github.ref_name }}
        run: |
          SBOM_TRAIT_PROFILE=default \
            bash Scripts/generate-sbom.sh .build/release-artifacts/sbom.cdx.json
          SBOM_TRAIT_PROFILE=core-only \
            bash Scripts/generate-sbom.sh .build/release-artifacts/sbom-core-only.cdx.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            .build/release-artifacts/benchmarks.json
            .build/release-artifacts/sbom.cdx.json
            .build/release-artifacts/sbom-core-only.cdx.json
            .build/release-artifacts/coverage-core/
            .build/release-artifacts/coverage-macros/
          if-no-files-found: error

  validate-platform-builds:
    name: Validate ${{ matrix.runtime }} Build
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - destination: "platform=macOS"
            runtime: "macOS"
            sdk: "macosx"
          - destination: "generic/platform=iOS Simulator"
            runtime: "iOS"
            sdk: "iphonesimulator"
          - destination: "generic/platform=tvOS Simulator"
            runtime: "tvOS"
            sdk: "appletvsimulator"
          - destination: "generic/platform=watchOS Simulator"
            runtime: "watchOS"
            sdk: "watchsimulator"
          - destination: "generic/platform=visionOS Simulator"
            runtime: "visionOS"
            sdk: "xrsimulator"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-release-${{ matrix.sdk }}-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-release-${{ matrix.sdk }}-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Require SDK and destination
        run: |
          set -euo pipefail

          sdk="${{ matrix.sdk }}"
          destination="${{ matrix.destination }}"
          runtime="${{ matrix.runtime }}"

          if ! xcrun --sdk "$sdk" --show-sdk-path >/dev/null 2>&1; then
            echo "::error::Required $runtime SDK $sdk is not installed on the release runner."
            exit 1
          fi

          platform="${destination##*platform=}"
          if ! destination_listing="$(xcodebuild -scheme InnoNetwork-Package -showdestinations 2>&1)"; then
            echo "::error::Unable to enumerate destinations for required $runtime release build."
            exit 1
          fi
          if ! awk -v platform="$platform" '
            index($0, "platform:" platform) > 0 &&
              $0 !~ /error:/ &&
              $0 !~ /variant:Designed for/ { found = 1 }
            END { exit found ? 0 : 1 }
          ' <<<"$destination_listing"; then
            echo "::error::Required $runtime destination $platform is not installed on the release runner."
            exit 1
          fi

      - name: Build package for ${{ matrix.runtime }}
        run: |
          xcodebuild \
            -scheme InnoNetwork-Package \
            -destination '${{ matrix.destination }}' \
            -skipMacroValidation \
            -derivedDataPath build/release-${{ matrix.sdk }} \
            build

  publish-release:
    name: Publish Release
    needs:
      - validate-release
      - validate-platform-builds
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for sigstore keyless signing (OIDC token).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: .release-artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Sign release artifacts (sigstore keyless)
        # Produces a `<artifact>.sig` (signature) and `<artifact>.crt` (Fulcio
        # certificate) next to each artifact. Verifiable with
        # `cosign verify-blob --certificate=<crt> --signature=<sig>` plus the
        # OIDC issuer / identity flags published in SECURITY.md.
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          artifacts=(
            .release-artifacts/benchmarks.json
            .release-artifacts/sbom.cdx.json
            .release-artifacts/sbom-core-only.cdx.json
          )
          for artifact in "${artifacts[@]}"; do
            if [[ ! -f "$artifact" ]]; then
              echo "Missing release artifact: $artifact" >&2
              exit 1
            fi
            cosign sign-blob --yes \
              --output-signature="${artifact}.sig" \
              --output-certificate="${artifact}.crt" \
              "$artifact"
          done

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          notes_source="docs/releases/${version}.md"
          notes_target=".release-artifacts/release-notes.md"

          if [[ ! -f "$notes_source" ]]; then
            echo "Missing validated release notes: $notes_source" >&2
            exit 1
          fi
          cp "$notes_source" "$notes_target"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "notes_path=${notes_target}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: InnoNetwork ${{ steps.notes.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            .release-artifacts/benchmarks.json
            .release-artifacts/benchmarks.json.sig
            .release-artifacts/benchmarks.json.crt
            .release-artifacts/sbom.cdx.json
            .release-artifacts/sbom.cdx.json.sig
            .release-artifacts/sbom.cdx.json.crt
            .release-artifacts/sbom-core-only.cdx.json
            .release-artifacts/sbom-core-only.cdx.json.sig
            .release-artifacts/sbom-core-only.cdx.json.crt
