name: Nightly Live Smoke

on:
  schedule:
    # 18:00 UTC daily (≈ 03:00 KST). Live endpoints are best-effort; failures
    # surface as a workflow run notification but do not block PRs.
    - cron: '0 18 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-live-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-smoke:
    name: Live endpoint smoke
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run live-endpoint tests
        env:
          INNO_LIVE: '1'
        run: |
          set -eo pipefail
          xcrun swift test \
            --filter InnoNetworkLiveTests \
            --parallel

      - name: WebSocket smoke (live)
        timeout-minutes: 10
        continue-on-error: true
        env:
          INNONETWORK_RUN_INTEGRATION: '1'
          INNONETWORK_WEBSOCKET_SMOKE_URL: ${{ vars.INNONETWORK_WEBSOCKET_SMOKE_URL || 'wss://echo.websocket.events' }}
        run: |
          set -eo pipefail
          curl --connect-timeout 5 --max-time 10 -fsS -o /dev/null \
            "$INNONETWORK_WEBSOCKET_SMOKE_URL"
          xcrun swift run -c release InnoNetworkWebSocketSmoke \
            "$INNONETWORK_WEBSOCKET_SMOKE_URL"

      - name: Persistent cache smoke (offline)
        timeout-minutes: 10
        run: |
          set -eo pipefail
          xcrun swift run -c release InnoNetworkCacheSmoke

      - name: OpenAPI adapter smoke (live)
        timeout-minutes: 10
        continue-on-error: true
        env:
          INNONETWORK_RUN_INTEGRATION: '1'
          INNONETWORK_OPENAPI_SMOKE_BASE_URL: ${{ vars.INNONETWORK_OPENAPI_SMOKE_BASE_URL || 'https://jsonplaceholder.typicode.com' }}
        run: |
          set -eo pipefail
          curl --connect-timeout 5 --max-time 10 -fsSI \
            "$INNONETWORK_OPENAPI_SMOKE_BASE_URL"
          xcrun swift run -c release InnoNetworkOpenAPISmoke \
            "$INNONETWORK_OPENAPI_SMOKE_BASE_URL"
