name: DocC Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build DocC Site
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Build DocC archives
        run: |
          xcodebuild docbuild \
            -scheme InnoNetwork-Package \
            -destination 'generic/platform=macOS' \
            -derivedDataPath .build/DocC

      - name: Transform DocC archives for static hosting
        env:
          BASE_PATH: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          SITE_DIR=".build/docc-site"
          mkdir -p "$SITE_DIR"
          touch "$SITE_DIR/.nojekyll"

          modules=(InnoNetwork InnoNetworkDownload InnoNetworkPersistentCache InnoNetworkWebSocket)
          for module in "${modules[@]}"; do
            archive="$(find .build/DocC/Build/Products -type d -path "*/${module}.doccarchive" -print -quit)"
            if [[ -z "$archive" || ! -d "$archive" ]]; then
              echo "Missing DocC archive for module: $module"
              exit 1
            fi

            xcrun docc process-archive transform-for-static-hosting "$archive" \
              --output-path "$SITE_DIR/$module" \
              --hosting-base-path "$BASE_PATH/$module"
          done

          cp docs/site/index.html "$SITE_DIR/index.html"

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: .build/docc-site

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
