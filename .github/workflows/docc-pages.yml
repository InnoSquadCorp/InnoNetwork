name: DocC Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build DocC Site
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Verify DocC archive contract fixtures
        run: bash Scripts/tests/test_check_docc_archives.sh

      - name: Build DocC archives
        run: |
          xcodebuild docbuild \
            -scheme InnoNetwork-Package \
            -destination 'generic/platform=macOS' \
            -skipMacroValidation \
            -derivedDataPath .build/DocC

      - name: Verify public DocC archives
        run: bash Scripts/check_docc_archives.sh .build/DocC

      - name: Transform DocC archives for static hosting
        env:
          BASE_PATH: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          SITE_DIR=".build/docc-site"
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"
          touch "$SITE_DIR/.nojekyll"

          while IFS= read -r module; do
            archive="$(find .build/DocC/Build/Products -type d -path "*/${module}.doccarchive" -print -quit)"
            if [[ -z "$archive" || ! -d "$archive" ]]; then
              echo "Missing DocC archive for module: $module"
              exit 1
            fi

            xcrun docc process-archive transform-for-static-hosting "$archive" \
              --output-path "$SITE_DIR/$module" \
              --hosting-base-path "$BASE_PATH/$module"
          done < docs/public-docc-products.txt

          cp docs/site/index.html "$SITE_DIR/index.html"

      - name: Validate DocC site files
        run: |
          set -euo pipefail

          SITE_DIR=".build/docc-site"
          test -f "$SITE_DIR/.nojekyll"
          test -s "$SITE_DIR/index.html"

          while IFS= read -r module; do
            slug="$(printf '%s' "$module" | tr '[:upper:]' '[:lower:]')"
            route="./${module}/documentation/${slug}"

            test -s "$SITE_DIR/${module}/index.html"
            test -s "$SITE_DIR/${module}/documentation/${slug}/index.html"
            test -s "$SITE_DIR/${module}/data/documentation/${slug}.json"
            grep -Fq "href=\"${route}" "$SITE_DIR/index.html"
          done < docs/public-docc-products.txt

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .build/docc-site

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Smoke deployed DocC URLs
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail

          base_url="${SITE_URL%/}"
          curl --fail --location --silent --show-error \
            --retry 12 --retry-delay 5 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            "$base_url/" >/dev/null

          while IFS= read -r module; do
            slug="$(printf '%s' "$module" | tr '[:upper:]' '[:lower:]')"
            curl --fail --location --silent --show-error \
              --retry 12 --retry-delay 5 --retry-all-errors \
              --connect-timeout 10 --max-time 30 \
              "$base_url/${module}/documentation/${slug}/" >/dev/null
          done < docs/public-docc-products.txt
