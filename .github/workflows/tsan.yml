name: TSAN Nightly

# ThreadSanitizer catches data races that strict-concurrency static analysis
# can miss — most commonly inside third-party C/Obj-C code (URLSession
# internals) and across actor boundaries that the compiler treats as safe
# because of manual `@unchecked Sendable` or legacy bridging.
#
# The full test suite is expensive under TSAN (typically 5–10× slower), so
# we run it nightly rather than per-PR. Manual trigger stays available via
# `workflow_dispatch` for ad-hoc verification of concurrency-heavy changes.

on:
  schedule:
    # 18:00 UTC ≈ 03:00 KST — cheap-runner hours.
    - cron: '0 18 * * *'
  workflow_dispatch:
  # On-demand PR trigger: apply the `concurrency-review` label when a
  # pull request touches actor isolation, Sendable conformances, or any
  # cross-task synchronization that benefits from a sanitizer pass before
  # merge. The default per-PR pipeline does not run TSAN because the full
  # suite is 5–10× slower; this label gives reviewers a low-friction way
  # to opt in.
  pull_request:
    types: [labeled, synchronize, reopened]

concurrency:
  group: tsan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-pr-changes:
    name: Detect concurrency-heavy changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.detect.outputs.should-run }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect paths
        id: detect
        shell: bash
        run: |
          set -eo pipefail

          git fetch origin "${{ github.base_ref }}" --depth=1
          changed="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"

          pattern='^(Sources/InnoNetwork/(Auth|RequestCoalescing|TaskEventHub|EventDeliveryChain|InFlightRegistry|DefaultNetworkClient|StreamingExecutor)|Sources/InnoNetworkDownload/|Sources/InnoNetworkWebSocket/|Tests/InnoNetworkTests/(.*(Auth|Coalesc|EventHub|InFlight|Streaming|Lifecycle).*)|Tests/InnoNetworkDownloadTests/|Tests/InnoNetworkWebSocketTests/).*\.swift$'
          if printf '%s\n' "$changed" | grep -E "$pattern" > /dev/null; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

  tsan-pr:
    name: Tests under ThreadSanitizer (PR)
    needs: detect-pr-changes
    if: >-
      contains(github.event.pull_request.labels.*.name, 'concurrency-review') ||
      needs.detect-pr-changes.outputs.should-run == 'true'
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run tests under ThreadSanitizer
        env:
          # Surface warnings as hard failures so flaky races are caught.
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: |
          set -eo pipefail
          tsan_dylib="$(xcrun clang -print-file-name=libclang_rt.tsan_osx_dynamic.dylib)"
          if [[ ! -f "$tsan_dylib" ]]; then
            echo "ThreadSanitizer runtime not found: $tsan_dylib" >&2
            exit 1
          fi
          export DYLD_INSERT_LIBRARIES="$tsan_dylib"
          xcrun swift test \
            -Xswiftc -sanitize=thread \
            --parallel

  tsan-scheduled:
    name: Tests under ThreadSanitizer (scheduled/manual)
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run tests under ThreadSanitizer
        env:
          # Surface warnings as hard failures so flaky races are caught.
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: |
          set -eo pipefail
          tsan_dylib="$(xcrun clang -print-file-name=libclang_rt.tsan_osx_dynamic.dylib)"
          if [[ ! -f "$tsan_dylib" ]]; then
            echo "ThreadSanitizer runtime not found: $tsan_dylib" >&2
            exit 1
          fi
          export DYLD_INSERT_LIBRARIES="$tsan_dylib"
          xcrun swift test \
            -Xswiftc -sanitize=thread \
            --parallel
