name: Benchmarks

on:
  pull_request:
    paths:
      - "Benchmarks/**"
      - "Sources/**"
      - "Package.swift"
      - ".github/workflows/benchmarks.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-benchmarks:
    name: Run Benchmarks
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-bench-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-bench-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Run guarded quick benchmarks
        env:
          MAX_REGRESSION_PERCENT: ${{ github.event_name == 'pull_request' && '20' || '10' }}
        run: |
          mkdir -p .build/benchmarks
          xcrun swift run InnoNetworkBenchmarks \
            --quick \
            --json-path .build/benchmarks/results.json \
            --enforce-baseline \
            --guard-benchmark events/task-event-fanout-single \
            --guard-benchmark persistence/download-persistence-restore \
            --guard-benchmark websocket/websocket-close-disposition-classify \
            --guard-benchmark websocket/websocket-ping-context-alloc \
            --guard-benchmark websocket/websocket-send-queue-reserve \
            --guard-benchmark websocket/websocket-lifecycle-transition-table \
            --guard-benchmark client/request-pipeline \
            --guard-benchmark client/request-coalescing-shared-get \
            --guard-benchmark cache/response-cache-lookup \
            --guard-benchmark cache/response-cache-revalidation \
            --max-regression-percent "$MAX_REGRESSION_PERCENT"

      - name: Render benchmark PR comment
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f .build/benchmarks/results.json ]; then
            python3 Scripts/render_benchmark_comment.py \
              .build/benchmarks/results.json \
              .build/benchmarks/comment.md
          else
            mkdir -p .build/benchmarks
            printf '## InnoNetwork benchmark summary\n\nBenchmark run did not produce results.json.\n' \
              > .build/benchmarks/comment.md
          fi

      - name: Comment benchmark summary on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file .build/benchmarks/comment.md

      - name: Append scheduled benchmark trend
        if: success() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          trend_dir="$(mktemp -d)"
          git fetch origin benchmark-trends || true
          if git show-ref --verify --quiet refs/remotes/origin/benchmark-trends; then
            git worktree add "$trend_dir" origin/benchmark-trends
          else
            git worktree add --detach "$trend_dir"
            git -C "$trend_dir" switch --orphan benchmark-trends
            git -C "$trend_dir" rm -rf . || true
          fi
          python3 Scripts/append_benchmark_trend.py \
            .build/benchmarks/results.json \
            "$trend_dir/trends/benchmark-results.jsonl"
          git -C "$trend_dir" add trends/benchmark-results.jsonl
          if git -C "$trend_dir" diff --cached --quiet; then
            exit 0
          fi
          git -C "$trend_dir" commit -m "Append benchmark trend for ${GITHUB_SHA}"
          git -C "$trend_dir" push origin HEAD:benchmark-trends

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: innonetwork-benchmarks
          path: .build/benchmarks/results.json
