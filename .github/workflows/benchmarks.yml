name: Benchmarks

on:
  pull_request:
    paths:
      - "Benchmarks/**"
      - "Sources/**"
      - "Package.swift"
      - ".github/workflows/benchmarks.yml"
      - "Scripts/compare_benchmark_runs.py"
      - "Scripts/render_benchmark_comment.py"
      - "Scripts/append_benchmark_trend.py"
      - "Scripts/check_guarded_benchmark_contract.sh"
      - "Scripts/tests/test_check_guarded_benchmark_contract.sh"
      - "Scripts/tests/test_compare_benchmark_runs.py"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-benchmarks:
    name: Run Benchmarks
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Cache SwiftPM artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/swiftpm-cache
          key: ${{ runner.os }}-bench-xcode-26.0.1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-bench-xcode-26.0.1-

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Test benchmark report tooling
        run: python3 Scripts/tests/test_compare_benchmark_runs.py

      - name: Verify guarded benchmark contract
        run: |
          bash Scripts/check_guarded_benchmark_contract.sh
          bash Scripts/tests/test_check_guarded_benchmark_contract.sh

      - name: Build pull request benchmark binaries
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          base_scratch="$RUNNER_TEMP/innonetwork-benchmarks/base-build"
          head_scratch="$RUNNER_TEMP/innonetwork-benchmarks/head-build"
          shared_cache="$GITHUB_WORKSPACE/.build/swiftpm-cache"

          git checkout --detach "$BASE_SHA"
          xcrun swift build -c release \
            --product InnoNetworkBenchmarks \
            --scratch-path "$base_scratch" \
            --cache-path "$shared_cache"
          base_bin="$(xcrun swift build -c release --scratch-path "$base_scratch" --cache-path "$shared_cache" --show-bin-path)/InnoNetworkBenchmarks"
          test -x "$base_bin"

          git checkout --detach "$HEAD_SHA"
          xcrun swift build -c release \
            --product InnoNetworkBenchmarks \
            --scratch-path "$head_scratch" \
            --cache-path "$shared_cache"
          head_bin="$(xcrun swift build -c release --scratch-path "$head_scratch" --cache-path "$shared_cache" --show-bin-path)/InnoNetworkBenchmarks"
          test -x "$head_bin"

          echo "BASE_BENCHMARK_BIN=$base_bin" >> "$GITHUB_ENV"
          echo "HEAD_BENCHMARK_BIN=$head_bin" >> "$GITHUB_ENV"

      - name: Compare interleaved pull request medians
        if: github.event_name == 'pull_request'
        env:
          MAX_REGRESSION_PERCENT: "20"
        run: |
          set -euo pipefail
          mkdir -p .build/benchmarks

          run_sample() {
            executable="$1"
            output="$2"
            "$executable" \
              --json-path "$output" \
              --baseline "${output}.missing" \
              > "${output%.json}.log"
          }

          # Balance execution-order and thermal drift across both revisions:
          # base/head, head/base, base/head.
          run_sample "$BASE_BENCHMARK_BIN" .build/benchmarks/base-1.json
          run_sample "$HEAD_BENCHMARK_BIN" .build/benchmarks/head-1.json
          run_sample "$HEAD_BENCHMARK_BIN" .build/benchmarks/head-2.json
          run_sample "$BASE_BENCHMARK_BIN" .build/benchmarks/base-2.json
          run_sample "$BASE_BENCHMARK_BIN" .build/benchmarks/base-3.json
          run_sample "$HEAD_BENCHMARK_BIN" .build/benchmarks/head-3.json

          python3 Scripts/compare_benchmark_runs.py \
            --base .build/benchmarks/base-1.json \
            --base .build/benchmarks/base-2.json \
            --base .build/benchmarks/base-3.json \
            --head .build/benchmarks/head-1.json \
            --head .build/benchmarks/head-2.json \
            --head .build/benchmarks/head-3.json \
            --output .build/benchmarks/results.json \
            --guard-benchmark events/task-event-fanout-single \
            --guard-benchmark persistence/download-persistence-restore \
            --guard-benchmark persistence/append-log-compaction \
            --guard-benchmark websocket/websocket-close-disposition-classify \
            --guard-benchmark websocket/websocket-ping-context-create \
            --guard-benchmark websocket/websocket-send-queue-reserve \
            --guard-benchmark websocket/websocket-lifecycle-transition-table \
            --guard-benchmark client/request-pipeline \
            --guard-benchmark client/request-coalescing-shared-get \
            --guard-benchmark client/decoding-interceptor-chain-1 \
            --guard-benchmark client/decoding-interceptor-chain-3 \
            --guard-benchmark client/decoding-interceptor-chain-8 \
            --guard-benchmark cache/response-cache-lookup \
            --guard-benchmark cache/response-cache-revalidation \
            --max-regression-percent "$MAX_REGRESSION_PERCENT"

      - name: Run guarded static-baseline benchmarks
        if: github.event_name != 'pull_request'
        env:
          MAX_REGRESSION_PERCENT: "10"
        run: |
          xcrun swift package resolve
          mkdir -p .build/benchmarks
          status=1
          for attempt in 1 2 3; do
            echo "Guarded benchmark attempt ${attempt}/3"
            if xcrun swift run -c release InnoNetworkBenchmarks \
              --quick \
              --json-path .build/benchmarks/results.json \
              --enforce-baseline \
              --guard-benchmark events/task-event-fanout-single \
              --guard-benchmark persistence/download-persistence-restore \
              --guard-benchmark persistence/append-log-compaction \
              --guard-benchmark websocket/websocket-close-disposition-classify \
              --guard-benchmark websocket/websocket-ping-context-create \
              --guard-benchmark websocket/websocket-send-queue-reserve \
              --guard-benchmark websocket/websocket-lifecycle-transition-table \
              --guard-benchmark client/request-pipeline \
              --guard-benchmark client/request-coalescing-shared-get \
              --guard-benchmark client/decoding-interceptor-chain-1 \
              --guard-benchmark client/decoding-interceptor-chain-3 \
              --guard-benchmark client/decoding-interceptor-chain-8 \
              --guard-benchmark cache/response-cache-lookup \
              --guard-benchmark cache/response-cache-revalidation \
              --max-regression-percent "$MAX_REGRESSION_PERCENT"; then
              exit 0
            else
              status=$?
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::Guarded benchmark attempt ${attempt} failed with exit code ${status}; retrying to smooth hosted-runner microbenchmark noise."
            fi
          done
          echo "::error::Guarded benchmark all 3 attempts failed with final exit code ${status}."
          exit "$status"

      - name: Render benchmark PR comment
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p .build/benchmarks
          {
            printf '<!-- innonetwork-benchmark-comment -->\n'
            if [ -f .build/benchmarks/results.json ]; then
              python3 Scripts/render_benchmark_comment.py \
                .build/benchmarks/results.json \
                /dev/stdout
            else
              printf '## InnoNetwork benchmark summary\n\nBenchmark run did not produce results.json.\n'
            fi
          } > .build/benchmarks/comment.md

      - name: Find existing benchmark comment
        if: always() && github.event_name == 'pull_request'
        id: find-benchmark-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- innonetwork-benchmark-comment -->"

      - name: Comment benchmark summary on PR (sticky)
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.find-benchmark-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: .build/benchmarks/comment.md
          edit-mode: replace

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: innonetwork-benchmarks
          path: .build/benchmarks/
          if-no-files-found: error

  append-trend:
    name: Append benchmark trend
    if: success() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: run-benchmarks
    runs-on: macos-15
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download benchmark artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: innonetwork-benchmarks
          path: .build/benchmarks

      - name: Append benchmark trend to benchmark-trends branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          trend_dir="$(mktemp -d)"
          git fetch origin benchmark-trends || true
          if git show-ref --verify --quiet refs/remotes/origin/benchmark-trends; then
            git worktree add "$trend_dir" origin/benchmark-trends
          else
            git worktree add --detach "$trend_dir"
            git -C "$trend_dir" switch --orphan benchmark-trends
            git -C "$trend_dir" rm -rf . || true
          fi
          python3 Scripts/append_benchmark_trend.py \
            .build/benchmarks/results.json \
            "$trend_dir/trends/benchmark-results.jsonl"
          git -C "$trend_dir" add trends/benchmark-results.jsonl
          if git -C "$trend_dir" diff --cached --quiet; then
            exit 0
          fi
          git -C "$trend_dir" commit -m "Append benchmark trend for ${GITHUB_SHA}"
          git -C "$trend_dir" push origin HEAD:benchmark-trends
