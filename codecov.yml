# Codecov configuration for InnoNetwork.
#
# The CI workflow (.github/workflows/ci.yml) uploads explicit runtime and macro
# LCOV reports. This file controls how Codecov interprets those reports and
# when it should fail a pull request.

codecov:
  require_ci_to_pass: true
  notify:
    # Wait for the runtime and macro uploads before posting the report.
    wait_for_ci: true

flags:
  core:
    paths:
      - "Sources/InnoNetwork/**/*"
      - "Sources/InnoNetworkAuthAWS/**/*"
      - "Sources/InnoNetworkDownload/**/*"
      - "Sources/InnoNetworkOpenAPI/**/*"
      - "Sources/InnoNetworkPersistentCache/**/*"
      - "Sources/InnoNetworkTestSupport/**/*"
      - "Sources/InnoNetworkTrust/**/*"
      - "Sources/InnoNetworkWebSocket/**/*"
    carryforward: false
  macros:
    paths:
      - "Sources/InnoNetworkMacros/**/*"
    carryforward: false

coverage:
  precision: 2
  round: down
  range: "70...90"

  status:
    project:
      default:
        # `auto` compares against the base commit's coverage so a healthy
        # project gradually ratchets upward without rewriting the threshold
        # on every release. `threshold: 1%` permits incidental drift (test
        # flakiness, refactors moving lines around) but a meaningful drop
        # still trips the gate.
        target: auto
        threshold: 1%
        # `base: auto` lets Codecov pick the appropriate base — typically
        # the PR's merge base — instead of always comparing against the
        # default branch tip.
        base: auto
        if_ci_failed: error
        only_pulls: false

    patch:
      default:
        # New / changed code must hit a higher absolute bar than the
        # repository-wide average. 75% matches the long-running floor in
        # API_STABILITY's coverage discussion; raise this when the project
        # average climbs comfortably above it.
        target: 75%
        threshold: 0%
        base: auto
        if_ci_failed: error
        only_pulls: true

  ignore:
    - "Tests/**/*"
    - "SmokeTests/**/*"
    - "Examples/**/*"
    - "Benchmarks/**/*"
    - ".build/**/*"

comment:
  # Post a single status comment on PRs with the project + patch diff,
  # but only re-comment when the numbers change so the PR thread stays
  # readable.
  layout: "header, diff, flags, files, footer"
  behavior: default
  require_changes: true

# Coverage reports are generated from explicit source roots. No extra `fixes`
# rewrites are needed here.
